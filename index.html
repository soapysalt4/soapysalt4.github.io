<!DOCTYPE html>
<html lang="en">
<head>
<script>
  // Helpers (same as before)
  function setCookie(name, value, days) {
    const d = new Date();
    d.setTime(d.getTime() + days * 24 * 60 * 60 * 1000);
    document.cookie = name + "=" + value + "; expires=" + d.toUTCString() + "; path=/; SameSite=Lax";
  }

  function getCookie(name) {
    const match = document.cookie.match(new RegExp("(^| )" + name + "=([^;]+)"));
    return match ? match[2] : null;
  }

  function generateID() {
    return String(100000 + Math.floor(Math.random() * 900000));
  }

  // Main logic — runs immediately
  (function setupUserID() {
    let userID = getCookie("userID");

    if (!userID) {
      userID = generateID();
      setCookie("userID", userID, 365);
    }

    const currentPath = window.location.pathname;

    // We prefer trailing slash style since Cloudflare enforces it anyway
    const desiredPath = "/" + userID + "/";

    // Ban file check (root-level, outside any folders)
    const banFile = "/" + userID + ".html";

    // Fast check if ban file exists
    fetch(banFile, { method: "HEAD", cache: "no-store" })
      .then(response => {
        if (response.ok) {
          // Ban exists → actually navigate to it (full page change)
          window.location.replace(banFile);
          return;
        }

        // No ban → only update URL bar if needed, NO reload
        if (currentPath !== desiredPath) {
          // Change URL without reloading or adding to history
          history.replaceState(null, "", desiredPath + window.location.search + window.location.hash);
        }

        // Optional: you can log or send the cronitor ping here if you want
        // (but only after deciding not to ban-redirect)
      })
      .catch(() => {
        // Ban fetch failed (404/network) → treat as not banned
        if (currentPath !== desiredPath) {
          history.replaceState(null, "", desiredPath + window.location.search + window.location.hash);
        }
      });
  })();
</script>

<body>
  <div id="starfield"></div>
  <h1 id="title">VexaCloud</h1>
  <div id="searchdiv">
    <input type="text" name="search" id="search" placeholder="search">
    <span id="m" class="material-symbols-outlined">Search</span>
  </div>
  <div id="ad" style="display: none;">
    <div id="adtag">ad</div>
  </div>
  <div id="switchdiv">
    <p style="text-wrap: wrap;"><b>About:blank<br> cloak</b></p>
    <label class="switch" style="align-self: center; margin-bottom:30px;">
      <input id="ab" type="checkbox" checked>
      <span class="slider round"></span>
    </label>
  </div>
  <div id="tilecontainer"></div>
  <button id="res" onclick="change()"></button>
  <p></p>
  <div id="feedback-button">
    <a href="/form/index.html" target="_blank">Feedback</a>
  </div>

<script>

// Your original scripts (starfield, theme, search, cloak, tiles)

if (!localStorage.getItem("theme")) {
  localStorage.setItem("theme", '1'); // Default to dark theme
}

const starCount = 1000;
const starfield = document.getElementById('starfield');
function random(min, max) {
  return Math.random() * (max - min) + min;
}
for (let i = 0; i < starCount; i++) {
  const star = document.createElement('div');
  star.classList.add('star');
  const size = random(0.5, 3);
  star.style.width = `${size}px`;
  star.style.height = `${size}px`;
  star.style.top = `${random(0, window.innerHeight)}px`;
  star.style.left = `${random(0, window.innerWidth)}px`;
  star.style.opacity = Math.random() * 0.8 + 0.2;
  star.style.animationDuration = `${random(3, 8)}s`;
  starfield.appendChild(star);
}

var gamelist = [
  { "link": "apps/main/index.html", "imgSrc": "images/apps.png", "title": "Apps" },
  { "link": "apps/games/index.html", "imgSrc": "images/game-logo.png", "title": "Games" },
  { "link": "links/main/index.html", "imgSrc": "images/links.jpg", "title": "Link Hub" }
];

var ab = false;

function change() {
  if (localStorage.getItem('theme') == '1') {
    localStorage.setItem("theme", '0');
    themeToggle("light");
  } else {
    localStorage.setItem("theme", '1');
    themeToggle("dark");
  }
}

function themeToggle(sigma){
  let root = document.documentElement;
  if(sigma == "light"){
      root.style.setProperty("--back", "rgb(230, 230, 230)");
      root.style.setProperty("--font", "black");
      root.style.setProperty("--tile", "rgb(210, 210, 210)");
      document.getElementById("res").innerHTML= "<span id='g' class='material-symbols-outlined'>dark_mode</span>";
      root.style.setProperty("--res", "rgba(11, 11, 11, 1)");
      root.style.setProperty("--themeicon", "white");
      root.style.setProperty("--grid", "rgb(189, 189, 189)");
  }else if (sigma == "dark"){
      root.style.setProperty("--back", "rgba(11, 11, 11, 1)");
      root.style.setProperty("--font", "white");
      root.style.setProperty("--tile", "rgba(15, 15, 15, 1)");
      document.getElementById("res").innerHTML= "<span id='g' class='material-symbols-outlined'>light_mode</span>";
      root.style.setProperty("--res", "rgb(230, 230, 230)");
      root.style.setProperty("--themeicon", "black");
      root.style.setProperty("--grid", "rgba(28, 28, 28, 1)");
  }
}

var localskib = localStorage.getItem('theme')=="1" ? "dark" : "light";
themeToggle(localskib);

var dataArr = {};
window.dataArr = gamelist.sort((a, b) => a.title.localeCompare(b.title));

$("#search").on('keypress keyup change input', function() {
  var div = document.getElementById("tilecontainer");
  var arrival = $(this).val().toLowerCase();
  div.innerHTML = "";
  dataArr.filter(function(game) {
    return (game.title.toLowerCase().indexOf(arrival) !== -1);
  }).map(function(game) {
    var tile = document.createElement('div');
    tile.addEventListener('click', function() {location.href = game.link}, false);
    tile.classList.add("tile");
    tile.innerHTML = '<img src="'+game.imgSrc+'" alt="placeholder"><p class="sigma">'+game.title+'</p>';
    div.append(tile);
  });
});

function cloak(game) {
  var win = window.open();
  var url = game;
  var iframe = win.document.createElement('iframe');
  iframe.style.width = "100%";
  iframe.style.height = "100%";
  iframe.style.border = "none";
  iframe.src = url;
  win.document.body.style.padding = "0";
  win.document.body.style.margin = "0";
  win.document.body.appendChild(iframe);
  setTimeout(function() {
    if (win.closed) {
      showPopup("The about:blank page was closed too quickly. Your school might be blocking this feature. Toggle the About:blank cloak in the bottom right to resolve this issue.\nNote: Securly blocks about blank tabs when a classroom session is active but it wont block them outside of a session or close open tabs when a session is started.");
    }
  }, 500);
}

function showPopup(message) {
  new Popup({
    id: "about-blank-warning",
    title: "Warning",
    content: message,
    buttonText: "OK"
  }).show();
}

var div = document.getElementById("tilecontainer");
div.innerHTML = "";
dataArr.forEach(function(game) {
  var tile = document.createElement('div');
  tile.addEventListener('click', function() {
    if(document.getElementById('ab').checked == false) {
      location.href = game.link;
    } else {
      cloak(game.link);
    }
  }, false);
  tile.classList.add("tile");
  tile.innerHTML = '<img src="'+game.imgSrc+'" alt="placeholder"><p class="sigma">'+game.title+'</p>';
  div.append(tile);
});
</script>
</body>
