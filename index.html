<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VexaCloud | Hacker114</title>
    <link rel="icon" type="image/png" href="/images/favicon.png">

    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="manifest" href="/manifest.json">

    <script src="/iframe.js"></script>
    <script src="/login-full-directory.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@simondmc/popup-js@1.4.2/popup.min.js"></script>
    <script async src="https://rum.cronitor.io/script.js"></script>

    <script>
        window.cronitor = window.cronitor || function() { (window.cronitor.q = window.cronitor.q || []).push(arguments); };
        cronitor('config', { clientKey: 'b72461a152926ec0d8e6d87824007208' });
    </script>

    <script>
        function setCookie(name, value, days) {
            const d = new Date();
            d.setTime(d.getTime() + days * 24 * 60 * 60 * 1000);
            document.cookie = name + "=" + value + "; expires=" + d.toUTCString() + "; path=/; SameSite=Lax";
        }

        function getCookie(name) {
            const match = document.cookie.match(new RegExp("(^| )" + name + "=([^;]+)"));
            return match ? match[2] : null;
        }

        function generateID() {
            return String(100000 + Math.floor(Math.random() * 900000));
        }

        function loadCronitor() {
            const s = document.createElement('script');
            s.async = true;
            s.src = "https://rum.cronitor.io/script.js";
            document.head.appendChild(s);

            window.cronitor = window.cronitor || function() {
                (window.cronitor.q = window.cronitor.q || []).push(arguments);
            };

            cronitor('config', { clientKey: 'c983eb319c32e403949792590d38aae0' });
        }

        function setupUserIDAndBanCheck() {
            let userID = getCookie("userID");
            if (!userID) {
                userID = generateID();
                setCookie("userID", userID, 365);
            }

            const currentPath = window.location.pathname;
            const desiredPath = "/" + userID + "/";
            const banFile = "/banned/" + userID + ".html";

            fetch(banFile, { method: "HEAD", cache: "no-store" })
                .then(response => {
                    if (response.ok) {
                        window.location.replace(banFile);
                        return;
                    }
                    if (currentPath !== desiredPath) {
                        history.replaceState(null, "", desiredPath + window.location.search + window.location.hash);
                    }
                    loadCronitor();
                    cronitor('ping', {
                        monitor: 'user-id-' + userID,
                        message: 'User ID: ' + userID,
                        url: desiredPath
                    });
                })
                .catch(() => {
                    if (currentPath !== desiredPath) {
                        history.replaceState(null, "", desiredPath + window.location.search + window.location.hash);
                    }
                    loadCronitor();
                    cronitor('ping', {
                        monitor: 'user-id-' + userID,
                        message: 'User ID: ' + userID,
                        url: desiredPath
                    });
                });
        }

        if (document.readyState === 'complete') {
            setupUserIDAndBanCheck();
        } else {
            window.addEventListener('load', setupUserIDAndBanCheck);
        }
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>

    <script>
        const SHOW_POPUP = false;
        const POPUP_HEADER = "Test";
        const POPUP_BODY  = "This announcement should hopefully show";

        function createAnnouncementPopup() {
            if (!SHOW_POPUP) return;
            if (document.getElementById("announcement-overlay")) return;

            const overlay = document.createElement("div");
            overlay.id = "announcement-overlay";

            const popup = document.createElement("div");
            popup.id = "announcement-popup";
            popup.innerHTML = `
                <span class="announcement-close">&times;</span>
                <h2>${POPUP_HEADER}</h2>
                <p>${POPUP_BODY}</p>
            `;

            overlay.appendChild(popup);
            document.body.appendChild(overlay);

            const closeBtn = popup.querySelector(".announcement-close");
            closeBtn.addEventListener("click", () => overlay.remove());

            overlay.addEventListener("click", (e) => {
                if (e.target === overlay) overlay.remove();
            });
        }

        window.addEventListener("load", createAnnouncementPopup);
    </script>
</head>

<body>
    <div id="starfield"></div>

    <h1 id="title">VexaCloud</h1>

    <div id="searchdiv">
        <input type="text" name="search" id="search" placeholder="search">
        <span id="m" class="material-symbols-outlined">search</span>
    </div>

    <div id="ad" style="display: none;">
        <div id="adtag">ad</div>
    </div>

    <div id="switchdiv">
        <p><b>About:blank<br>cloak</b></p>
        <label class="switch">
            <input id="ab" type="checkbox">
            <span class="slider round"></span>
        </label>
    </div>

    <div id="tilecontainer"></div>

    <button id="res" onclick="change()"></button>
    <p></p>

    <div id="feedback-button">
        <a href="/form/index.html" target="_blank">Feedback</a>
    </div>

    <script>
        if (!localStorage.getItem("theme")) {
            localStorage.setItem("theme", '1');
        }

        const starCount = 1000;
        const starfield = document.getElementById('starfield');

        function random(min, max) {
            return Math.random() * (max - min) + min;
        }

        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            const size = random(0.5, 3);
            star.style.width  = `${size}px`;
            star.style.height = `${size}px`;
            star.style.top    = `${random(0, window.innerHeight)}px`;
            star.style.left   = `${random(0, window.innerWidth)}px`;
            star.style.opacity = Math.random() * 0.8 + 0.2;
            star.style.animationDuration = `${random(3, 8)}s`;
            starfield.appendChild(star);
        }

        const gamelist = [
            { link: "/apps/main/index.html",   imgSrc: "/images/apps.png",       title: "Apps"      },
            { link: "/games/main/index.html",  imgSrc: "/images/game-logo.png",  title: "Games"     },
            { link: "/links/main/index.html",  imgSrc: "/images/links.jpg",      title: "Link Hub"  }
        ];

        let savedAB = localStorage.getItem("aboutBlankEnabled");
        if (savedAB === null) {
            localStorage.setItem("aboutBlankEnabled", "0");
            savedAB = "0";
        }

        document.getElementById("ab").checked = savedAB === "1";
        document.getElementById("ab").addEventListener("change", function () {
            localStorage.setItem("aboutBlankEnabled", this.checked ? "1" : "0");
        });

        function change() {
            if (localStorage.getItem('theme') == '1') {
                localStorage.setItem("theme", '0');
                themeToggle("light");
            } else {
                localStorage.setItem("theme", '1');
                themeToggle("dark");
            }
        }

        function themeToggle(sigma) {
            let root = document.documentElement;
            if (sigma == "light") {
                root.style.setProperty("--back",       "rgb(230, 230, 230)");
                root.style.setProperty("--font",       "white");
                root.style.setProperty("--tile",       "rgb(210, 210, 210)");
                root.style.setProperty("--res",        "rgba(11, 11, 11, 1)");
                root.style.setProperty("--themeicon",  "white");
                root.style.setProperty("--grid",       "rgb(189, 189, 189)");
                document.getElementById("res").innerHTML = "<span id='g' class='material-symbols-outlined'>dark_mode</span>";
                document.body.style.background = "url('/images/22973.gif') center center / cover no-repeat fixed";
            } else if (sigma == "dark") {
                root.style.setProperty("--back",       "rgba(11, 11, 11, 1)");
                root.style.setProperty("--font",       "white");
                root.style.setProperty("--tile",       "rgba(15, 15, 15, 1)");
                root.style.setProperty("--res",        "rgb(230, 230, 230)");
                root.style.setProperty("--themeicon",  "black");
                root.style.setProperty("--grid",       "rgba(28, 28, 28, 1)");
                document.getElementById("res").innerHTML = "<span id='g' class='material-symbols-outlined'>light_mode</span>";
                document.body.style.background = "url('/images/22972.jpg') center center / cover no-repeat fixed";
            }
        }

        const localskib = localStorage.getItem('theme') == "1" ? "dark" : "light";
        themeToggle(localskib);

        window.dataArr = gamelist.sort((a, b) => a.title.localeCompare(b.title));

        $("#search").on('keypress keyup change input', function() {
            const div = document.getElementById("tilecontainer");
            const arrival = $(this).val().toLowerCase();
            div.innerHTML = "";

            dataArr
                .filter(game => game.title.toLowerCase().indexOf(arrival) !== -1)
                .forEach(game => {
                    const tile = document.createElement('div');
                    tile.classList.add("tile");
                    tile.innerHTML = `<img src="${game.imgSrc}" alt="placeholder"><p class="sigma">${game.title}</p>`;
                    tile.addEventListener('click', () => location.href = game.link, false);
                    div.appendChild(tile);
                });
        });

        function cloak(url) {
            const win = window.open();
            const iframe = win.document.createElement('iframe');
            iframe.style.width = "100%";
            iframe.style.height = "100%";
            iframe.style.border = "none";
            iframe.src = url;

            win.document.body.style.padding = "0";
            win.document.body.style.margin  = "0";
            win.document.body.appendChild(iframe);

            setTimeout(() => {
                if (win.closed) {
                    showPopup(
                        "The about:blank page was closed too quickly. Your school might be blocking this feature. " +
                        "Toggle the About:Blank cloak in the bottom right to resolve this issue. " +
                        "Note: Securly blocks about blank tabs when a classroom session is active, but it won't block them outside of a session."
                    );
                }
            }, 500);
        }

        function showPopup(message) {
            new Popup({
                id: "about-blank-warning",
                title: "Warning",
                content: message,
                buttonText: "OK"
            }).show();
        }

        const div = document.getElementById("tilecontainer");
        div.innerHTML = "";

        dataArr.forEach(game => {
            const tile = document.createElement('div');
            tile.classList.add("tile");
            tile.innerHTML = `<img src="${game.imgSrc}" alt="placeholder"><p class="sigma">${game.title}</p>`;

            tile.addEventListener('click', () => {
                if (document.getElementById('ab').checked) {
                    cloak(game.link);
                } else {
                    location.href = game.link;
                }
            }, false);

            div.appendChild(tile);
        });
    </script>
</body>
</html>
