      <script>
        function setCookie(name, value, days) {
            const d = new Date();
            d.setTime(d.getTime() + days * 24 * 60 * 60 * 1000);
            document.cookie = name + "=" + value + "; expires=" + d.toUTCString() + "; path=/; SameSite=Lax";
        }

        function getCookie(name) {
            const match = document.cookie.match(new RegExp("(^| )" + name + "=([^;]+)"));
            return match ? match[2] : null;
        }

        function generateID() {
            return String(100000 + Math.floor(Math.random() * 900000));
        }

        function loadCronitor() {
            const s = document.createElement('script');
            s.async = true;
            s.src = "https://rum.cronitor.io/script.js";
            document.head.appendChild(s);

            window.cronitor = window.cronitor || function() {
                (window.cronitor.q = window.cronitor.q || []).push(arguments);
            };

            cronitor('config', { clientKey: 'c983eb319c32e403949792590d38aae0' });
        }

        function setupUserIDAndBanCheck() {
            let userID = getCookie("userID");
            if (!userID) {
                userID = generateID();
                setCookie("userID", userID, 365);
            }

            const currentPath = window.location.pathname;
            const desiredPath = "/" + userID + "/";
            const banFile = "/banned/" + userID + ".html";

            fetch(banFile, { method: "HEAD", cache: "no-store" })
                .then(response => {
                    if (response.ok) {
                        window.location.replace(banFile);
                        return;
                    }
                    if (currentPath !== desiredPath) {
                        history.replaceState(null, "", desiredPath + window.location.search + window.location.hash);
                    }
                    loadCronitor();
                    cronitor('ping', {
                        monitor: 'user-id-' + userID,
                        message: 'User ID: ' + userID,
                        url: desiredPath
                    });
                })
                .catch(() => {
                    if (currentPath !== desiredPath) {
                        history.replaceState(null, "", desiredPath + window.location.search + window.location.hash);
                    }
                    loadCronitor();
                    cronitor('ping', {
                        monitor: 'user-id-' + userID,
                        message: 'User ID: ' + userID,
                        url: desiredPath
                    });
                });
        }

        if (document.readyState === 'complete') {
            setupUserIDAndBanCheck();
        } else {
            window.addEventListener('load', setupUserIDAndBanCheck);
        }
    </script>

  <script>
    const supabaseClient = supabase.createClient(
      "https://andxngfcbdxfsmgbxpws.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFuZHhuZ2ZjYmR4ZnNtZ2J4cHdzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNDA5NjgsImV4cCI6MjA4ODgxNjk2OH0.DXHVQBypVrvn3s3A4cstmZeQEpEDCmAAUuJ0bRebCaQ"
    );

    let currentUser = null;
    let currentProfile = null;

    const authWrapper = document.getElementById("auth-wrapper");
    const feedWrapper = document.getElementById("feed-wrapper");
    const authMsg = document.getElementById("auth-message");
    const avatarPreview = document.getElementById("avatar-preview");

    const composerAvatar = document.getElementById("composer-avatar");
    const composerTextarea = document.getElementById("composer-textarea");
    const composerImageInput = document.getElementById("composer-image-input");
    const composerImageName = document.getElementById("composer-image-name");
    const composerPostButton = document.getElementById("composer-post-button");
    const postsContainer = document.getElementById("posts");

    function showSpinner(id) {
      document.getElementById(id).style.display = "block";
    }

    function hideSpinner(id) {
      document.getElementById(id).style.display = "none";
    }

    // Tabs
    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
        tab.classList.add("active");
        document.getElementById(tab.dataset.tab).classList.add("active");
        authMsg.textContent = "";
        authMsg.className = "message";
      });
    });

    // Avatar preview
    document.getElementById("signup-avatar").addEventListener("change", e => {
      const file = e.target.files[0];
      if (file) {
        avatarPreview.src = URL.createObjectURL(file);
        avatarPreview.style.display = "block";
      } else {
        avatarPreview.style.display = "none";
      }
    });

    // SIGNUP
    document.getElementById("signup-button").onclick = async () => {
      showSpinner("signup-spinner");
      authMsg.textContent = "";
      authMsg.className = "message";

      const username = document.getElementById("signup-username").value.trim();
      const email = document.getElementById("signup-email").value.trim();
      const password = document.getElementById("signup-password").value;
      const avatarFile = document.getElementById("signup-avatar").files[0];

      if (!username || !email || !password || !avatarFile) {
        authMsg.textContent = "All fields are required.";
        authMsg.classList.add("error");
        hideSpinner("signup-spinner");
        return;
      }

      const { data: signUpData, error: signUpError } = await supabaseClient.auth.signUp({ email, password });
      if (signUpError) {
        authMsg.textContent = signUpError.message;
        authMsg.classList.add("error");
        hideSpinner("signup-spinner");
        return;
      }

      const user = signUpData.user;

      const ext = avatarFile.name.split(".").pop();
      const filePath = `${user.id}/avatar.${ext}`;

      const { error: uploadError } = await supabaseClient.storage
        .from("avatars")
        .upload(filePath, avatarFile, { upsert: true });

      if (uploadError) {
        authMsg.textContent = uploadError.message;
        authMsg.classList.add("error");
        hideSpinner("signup-spinner");
        return;
      }

      const { data: urlData } = supabaseClient.storage.from("avatars").getPublicUrl(filePath);
      const avatarUrl = urlData.publicUrl;

      const { error: profileError } = await supabaseClient
        .from("profiles")
        .insert({
          id: user.id,
          username,
          contact_email: email,
          avatar_url: avatarUrl,
          visible: true
        });

      if (profileError) {
        authMsg.textContent = profileError.message;
        authMsg.classList.add("error");
        hideSpinner("signup-spinner");
        return;
      }

      // Auto login
      const { data: autoLogin, error: autoLoginError } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (autoLoginError) {
        authMsg.textContent = autoLoginError.message;
        authMsg.classList.add("error");
        hideSpinner("signup-spinner");
        return;
      }

      currentUser = autoLogin.user;

      const { data: fullProfile2 } = await supabaseClient
        .from("profiles")
        .select("*")
        .eq("id", currentUser.id)
        .maybeSingle();

      currentProfile = fullProfile2;

      enterFeed();
      hideSpinner("signup-spinner");
    };

    // LOGIN
    document.getElementById("login-button").onclick = async () => {
      showSpinner("login-spinner");
      authMsg.textContent = "";
      authMsg.className = "message";

      const username = document.getElementById("login-username").value.trim();
      const password = document.getElementById("login-password").value;

      if (!username || !password) {
        authMsg.textContent = "Enter username and password.";
        authMsg.classList.add("error");
        hideSpinner("login-spinner");
        return;
      }

      const { data: profile } = await supabaseClient
        .from("profiles")
        .select("contact_email")
        .eq("username", username)
        .maybeSingle();

      if (!profile) {
        authMsg.textContent = "User not found.";
        authMsg.classList.add("error");
        hideSpinner("login-spinner");
        return;
      }

      const email = profile.contact_email;

      const { data: loginData, error: loginError } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (loginError) {
        authMsg.textContent = loginError.message;
        authMsg.classList.add("error");
        hideSpinner("login-spinner");
        return;
      }

      currentUser = loginData.user;

      const { data: fullProfile } = await supabaseClient
        .from("profiles")
        .select("*")
        .eq("id", currentUser.id)
        .maybeSingle();

      currentProfile = fullProfile;

      enterFeed();
      hideSpinner("login-spinner");
    };

    function enterFeed() {
      authWrapper.style.display = "none";
      feedWrapper.style.display = "flex";

      if (currentProfile && currentProfile.avatar_url) {
        composerAvatar.src = currentProfile.avatar_url;
      } else {
        composerAvatar.src = "";
      }

      loadFeed();
      subscribeToFeed();
    }

    // Composer image name
    composerImageInput.addEventListener("change", e => {
      const file = e.target.files[0];
      composerImageName.textContent = file ? file.name : "";
    });

    // Enter to post (Shift+Enter = newline)
    composerTextarea.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        composerPostButton.click();
      }
    });

    // Create post
    composerPostButton.onclick = async () => {
      if (!currentUser) return;

      const content = composerTextarea.value.trim();
      const file = composerImageInput.files[0];

      if (!content && !file) return;

      composerPostButton.disabled = true;

      let imageUrl = null;

      if (file) {
        const ext = file.name.split(".").pop();
        const filePath = `${currentUser.id}/${Date.now()}.${ext}`;

        const { error: uploadError } = await supabaseClient.storage
          .from("post-images")
          .upload(filePath, file, { upsert: true });

        if (uploadError) {
          console.error(uploadError);
        } else {
          const { data: urlData } = supabaseClient.storage.from("post-images").getPublicUrl(filePath);
          imageUrl = urlData.publicUrl;
        }
      }

      await supabaseClient.from("posts").insert({
        user_id: currentUser.id,
        content: content || null,
        image_url: imageUrl
      });

      composerTextarea.value = "";
      composerImageInput.value = "";
      composerImageName.textContent = "";
      composerPostButton.disabled = false;

      loadFeed();
    };

    async function loadFeed() {
      const { data: posts } = await supabaseClient
        .from("feed")
        .select("*")
        .order("created_at", { ascending: false });

      const { data: reactions } = await supabaseClient
        .from("post_reaction_counts")
        .select("*");

      const { data: comments } = await supabaseClient
        .from("post_comments")
        .select("*");

      const reactionMap = {};
      (reactions || []).forEach(r => {
        if (!reactionMap[r.post_id]) reactionMap[r.post_id] = {};
        reactionMap[r.post_id][r.emoji] = r.count;
      });

      const commentMap = {};
      (comments || []).forEach(c => {
        if (!commentMap[c.post_id]) commentMap[c.post_id] = [];
        commentMap[c.post_id].push(c);
      });

      postsContainer.innerHTML = "";

      (posts || []).forEach(post => {
        const postEl = document.createElement("div");
        postEl.className = "post";
        postEl.dataset.postId = post.id;

        const header = document.createElement("div");
        header.className = "post-header";

        const avatar = document.createElement("img");
        avatar.className = "post-avatar";
        avatar.src = post.avatar_url || "";

        const headerText = document.createElement("div");
        const usernameEl = document.createElement("div");
        usernameEl.className = "post-username";
        usernameEl.textContent = post.username;

        const timeEl = document.createElement("div");
        timeEl.className = "post-time";
        timeEl.textContent = new Date(post.created_at).toLocaleString();

        headerText.appendChild(usernameEl);
        headerText.appendChild(timeEl);

        header.appendChild(avatar);
        header.appendChild(headerText);

        const contentEl = document.createElement("div");
        contentEl.className = "post-content";
        contentEl.textContent = post.content || "";

        postEl.appendChild(header);
        if (post.content) postEl.appendChild(contentEl);

        if (post.image_url) {
          const img = document.createElement("img");
          img.className = "post-image";
          img.src = post.image_url;
          postEl.appendChild(img);
        }

        const footer = document.createElement("div");
        footer.className = "post-footer";

        const emojis = ["👍", "❤️", "😂"];
        emojis.forEach(emoji => {
          const btn = document.createElement("button");
          btn.className = "reaction-button";
          btn.type = "button";
          btn.textContent = emoji;

          const countSpan = document.createElement("span");
          countSpan.textContent = reactionMap[post.id]?.[emoji] || 0;
          btn.appendChild(countSpan);

          btn.addEventListener("click", () => handleReaction(post.id, emoji));

          footer.appendChild(btn);
        });

        const commentToggle = document.createElement("span");
        commentToggle.className = "comment-toggle";
        const commentCount = (commentMap[post.id] || []).length;
        commentToggle.textContent = `Comments (${commentCount})`;
        footer.appendChild(commentToggle);

        postEl.appendChild(footer);

        const commentsEl = document.createElement("div");
        commentsEl.className = "comments";
        commentsEl.style.display = "none";

        const commentList = document.createElement("div");
        (commentMap[post.id] || []).forEach(c => {
          const cEl = document.createElement("div");
          cEl.className = "comment";

          const cAvatar = document.createElement("img");
          cAvatar.className = "comment-avatar";
          cAvatar.src = c.avatar_url || "";

          const cBody = document.createElement("div");
          cBody.className = "comment-body";

          const cUser = document.createElement("div");
          cUser.className = "comment-username";
          cUser.textContent = c.username;

          const cText = document.createElement("div");
          cText.className = "comment-text";
          cText.textContent = c.content;

          cBody.appendChild(cUser);
          cBody.appendChild(cText);

          cEl.appendChild(cAvatar);
          cEl.appendChild(cBody);

          commentList.appendChild(cEl);
        });

        const commentInputRow = document.createElement("div");
        commentInputRow.className = "comment-input-row";

        const commentInput = document.createElement("input");
        commentInput.className = "comment-input";
        commentInput.placeholder = "Write a comment...";

        commentInput.addEventListener("keydown", e => {
          if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            commentSendButton.click();
          }
        });

        const commentSendButton = document.createElement("button");
        commentSendButton.className = "comment-send-button";
        commentSendButton.type = "button";
        commentSendButton.textContent = "Send";

        commentSendButton.addEventListener("click", async () => {
          const text = commentInput.value.trim();
          if (!text || !currentUser) return;

          await supabaseClient.from("comments").insert({
            post_id: post.id,
            user_id: currentUser.id,
            content: text
          });

          commentInput.value = "";
          loadFeed();
        });

        commentInputRow.appendChild(commentInput);
        commentInputRow.appendChild(commentSendButton);

        commentsEl.appendChild(commentList);
        commentsEl.appendChild(commentInputRow);

        commentToggle.addEventListener("click", () => {
          commentsEl.style.display = commentsEl.style.display === "none" ? "block" : "none";
        });

        postEl.appendChild(commentsEl);

        postsContainer.appendChild(postEl);
      });
    }

    async function handleReaction(postId, emoji) {
      if (!currentUser) return;

      await supabaseClient
        .from("reactions")
        .upsert(
          {
            post_id: postId,
            user_id: currentUser.id,
            emoji
          },
          { onConflict: "post_id,user_id,emoji" }
        );

      loadFeed();
    }

    function subscribeToFeed() {
      supabaseClient
        .channel("public:posts")
        .on(
          "postgres_changes",
          { event: "INSERT", schema: "public", table: "posts" },
          () => loadFeed()
        )
        .on(
          "postgres_changes",
          { event: "INSERT", schema: "public", table: "comments" },
          () => loadFeed()
        )
        .on(
          "postgres_changes",
          { event: "INSERT", schema: "public", table: "reactions" },
          () => loadFeed()
        )
        .subscribe();
    }

    // LOGOUT
    document.getElementById("logout-button").onclick = async () => {
      await supabaseClient.auth.signOut();

      feedWrapper.style.display = "none";
      authWrapper.style.display = "flex";

      currentUser = null;
      currentProfile = null;

      document.getElementById("login-username").value = "";
      document.getElementById("login-password").value = "";
      document.getElementById("signup-username").value = "";
      document.getElementById("signup-email").value = "";
      document.getElementById("signup-password").value = "";
      document.getElementById("signup-avatar").value = "";
      avatarPreview.style.display = "none";
    };
  </script>
</body>
</html>
