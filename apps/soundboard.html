<!DOCTYPE html>
<html lang="en">

<head>
    <script src="/login-full-directory.js"></script>
    <script>
  // ────────────────────────────────────────────────
  //  Cookie & ID helpers
  // ────────────────────────────────────────────────
  function setCookie(name, value, days) {
    const d = new Date();
    d.setTime(d.getTime() + days * 24 * 60 * 60 * 1000);
    document.cookie = name + "=" + value + "; expires=" + d.toUTCString() + "; path=/; SameSite=Lax";
  }

  function getCookie(name) {
    const match = document.cookie.match(new RegExp("(^| )" + name + "=([^;]+)"));
    return match ? match[2] : null;
  }

  function generateID() {
    return String(100000 + Math.floor(Math.random() * 900000));
  }

  // ────────────────────────────────────────────────
  //  Cronitor setup
  // ────────────────────────────────────────────────
  function loadCronitor() {
    const s = document.createElement('script');
    s.async = true;
    s.src = "https://rum.cronitor.io/script.js";
    document.head.appendChild(s);
    window.cronitor = window.cronitor || function() {
      (window.cronitor.q = window.cronitor.q || []).push(arguments);
    };
    cronitor('config', { clientKey: 'c983eb319c32e403949792590d38aae0' });
  }

  // ────────────────────────────────────────────────
  //  Main logic
  // ────────────────────────────────────────────────
  function setupUserIDAndBanCheck() {
    let userID = getCookie("userID");

    if (!userID) {
      userID = generateID();
      setCookie("userID", userID, 365);
    }

    const currentPath = window.location.pathname;
    const desiredPath = "/" + userID + "/";

    // UPDATED: check inside /banned/
    const banFile = "/banned/" + userID + ".html";

    fetch(banFile, { method: "HEAD", cache: "no-store" })
      .then(response => {
        if (response.ok) {
          window.location.replace(banFile);
          return;
        }

        if (currentPath !== desiredPath) {
          history.replaceState(null, "", desiredPath + window.location.search + window.location.hash);
        }

        loadCronitor();
        cronitor('ping', {
          monitor: 'user-id-' + userID,
          message: 'User ID: ' + userID,
          url: desiredPath
        });
      })
      .catch(() => {
        if (currentPath !== desiredPath) {
          history.replaceState(null, "", desiredPath + window.location.search + window.location.hash);
        }

        loadCronitor();
        cronitor('ping', {
          monitor: 'user-id-' + userID,
          message: 'User ID: ' + userID,
          url: desiredPath
        });
      });
  }

  if (document.readyState === 'complete') {
    setupUserIDAndBanCheck();
  } else {
    window.addEventListener('load', setupUserIDAndBanCheck);
  }
</script>
