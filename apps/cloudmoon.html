<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloudmoon | VexaCloud</title>
  <link rel="icon" href="/images/favicon.png">
  <style>
    body, html { margin:0; padding:0; height:100%; overflow:hidden; background:#000; font-family:Arial,sans-serif; }
    #frame { width:100%; height:100vh; border:none; display:block; }
    #madeby {
      position:fixed; top:8px; left:8px; color:#aaa; background:rgba(0,0,0,0.6);
      padding:4px 8px; border-radius:4px; font-size:12px; z-index:1000;
      pointer-events:none;
    }
    #status {
      position:fixed; top:8px; right:8px; color:#0f0; background:rgba(0,0,0,0.7);
      padding:6px 10px; border-radius:4px; font-size:13px; z-index:999;
      max-width:300px; word-break:break-all; pointer-events:none;
    }
  </style>
</head>
<body>

<div id="madeby">Made by Grok</div>
<div id="status">Loading... Click buttons → frame reloads with link (popups blocked)</div>

<iframe id="frame" src="https://web.cloudmoonapp.com/"
  sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-presentation allow-storage-access-by-user-activation">
  <!-- No allow-popups → browser blocks window.open / _blank attempts -->
</iframe>

<script>
const iframe = document.getElementById('frame');
const status = document.getElementById('status');
const BASE = 'https://web.cloudmoonapp.com';

function show(txt, dur=4000) {
  status.textContent = txt;
  setTimeout(() => status.textContent = '', dur);
}

function reloadFrame(url) {
  if (!url) return false;
  try {
    const target = new URL(url, BASE);
    if (target.origin === BASE) {
      show('Button/popup caught → reloading frame with new link');
      iframe.src = target.href;
      return true;
    }
  } catch {}
  show('Blocked (external or invalid)');
  return false;
}

iframe.addEventListener('load', () => {
  show('Frame ready — watching clicks');
  try {
    const doc = iframe.contentDocument;
    if (!doc) return;

    const hookClicks = () => {
      // Catch links
      doc.querySelectorAll('a[href]').forEach(a => {
        a.target = '_self';
        a.onclick = e => { if (reloadFrame(a.href)) e.preventDefault(); };
      });

      // Catch buttons / elements with possible URLs
      doc.querySelectorAll('button, [onclick], [data-href], [data-url], [data-link], [href]').forEach(el => {
        let urlSrc = el.href || el.getAttribute('href') ||
                     el.dataset?.href || el.dataset?.url || el.dataset?.link ||
                     (el.onclick ? el.getAttribute('onclick')?.match(/['"](https?:\/\/[^'"]+)['"]/i)?.[1] : null);

        if (urlSrc) {
          el.onclick = e => {
            if (reloadFrame(urlSrc)) {
              e.preventDefault();
              e.stopPropagation();
            }
          };
        }
      });
    };

    hookClicks();

    // Re-apply on dynamic changes (games list loads async)
    new MutationObserver(hookClicks).observe(doc.body, {
      childList: true,
      subtree: true,
      attributes: true,
      attributeFilter: ['href','onclick','data-href','data-url','data-link']
    });

    // Super broad click listener as last resort
    doc.addEventListener('click', e => {
      let tgt = e.target.closest('a,button,[onclick],[data-href],[data-url],[href]');
      if (!tgt) return;
      let url = tgt.href || tgt.getAttribute('href') ||
                tgt.dataset?.href || tgt.dataset?.url ||
                (tgt.getAttribute('onclick')?.match(/['"](https?:\/\/[^'"]+)['"]/i)?.[1]);
      if (url && reloadFrame(url)) {
        e.preventDefault();
        e.stopImmediatePropagation();
      }
    }, true);

  } catch (err) {
    show('Limited inspect (cross-origin ok)');
  }
});
</script>
</body>
</html>
