<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloudmoon - In-Frame Navigation (about:blank style)</title>
  <style>
    body, html { margin:0; padding:0; height:100%; overflow:hidden; background:#111; font-family:Arial,sans-serif; }
    #frame-container { width:100%; height:100vh; position:relative; }
    #frame { width:100%; height:100%; border:none; display:block; background:#000; }
    #madeby {
      position:fixed; top:8px; left:8px; color:#ccc; background:rgba(0,0,0,0.7);
      padding:4px 10px; border-radius:4px; font-size:12px; z-index:1000;
      pointer-events:none;
    }
    #status {
      position:fixed; top:8px; right:8px; color:#0f8; background:rgba(0,0,0,0.8);
      padding:6px 12px; border-radius:6px; font-size:13px; z-index:999;
      max-width:320px; word-break:break-all; pointer-events:none;
    }
  </style>
</head>
<body>

<div id="madeby">Made by Grok</div>
<div id="status">Loading Cloudmoon... Navigation attempts → reload inside frame (popups blocked)</div>

<div id="frame-container">
  <iframe id="frame" src="https://web.cloudmoonapp.com/"
          sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-presentation allow-storage-access-by-user-activation">
          <!-- No allow-popups → blocks real popups/new tabs -->
  </iframe>
</div>

<script>
const container = document.getElementById('frame-container');
const status = document.getElementById('status');
const BASE = 'https://web.cloudmoonapp.com';

function show(txt, dur=4000) {
  status.textContent = txt;
  setTimeout(() => status.textContent = '', dur);
}

function createOrReplaceIframe(url) {
  try {
    const u = new URL(url, BASE);
    if (u.origin !== BASE) {
      show('Blocked external URL');
      return;
    }
    show('Navigation caught → loading in frame');
    console.log('Loading:', u.href);

    // Remove old iframe if exists
    const old = document.getElementById('frame');
    if (old) old.remove();

    // Create fresh one (mimics "about:blank" start then set src)
    const newFrame = document.createElement('iframe');
    newFrame.id = 'frame';
    newFrame.src = u.href;
    newFrame.sandbox = 'allow-scripts allow-same-origin allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-presentation allow-storage-access-by-user-activation';
    newFrame.style.width = '100%';
    newFrame.style.height = '100%';
    newFrame.style.border = 'none';
    container.appendChild(newFrame);

    // Re-attach load listener
    newFrame.addEventListener('load', onFrameLoad);
  } catch (e) {
    show('Invalid URL attempt');
  }
}

function onFrameLoad() {
  show('Frame loaded');
  try {
    const doc = this.contentDocument;
    if (!doc) return;

    const intercept = () => {
      // Links
      doc.querySelectorAll('a[href]').forEach(a => {
        a.target = '_self';
        a.onclick = e => { if (tryCaptureUrl(a.href)) e.preventDefault(); };
      });

      // Buttons/elements with URLs
      doc.querySelectorAll('button, [onclick], [data-href], [data-url], [data-link], [href]').forEach(el => {
        let url = el.href || el.getAttribute('href') ||
                  el.dataset?.href || el.dataset?.url || el.dataset?.link ||
                  (el.getAttribute('onclick')?.match(/['"](https?:\/\/[^'"]+)['"]/i)?.[1]);
        if (url) {
          el.onclick = e => {
            if (tryCaptureUrl(url)) {
              e.preventDefault();
              e.stopPropagation();
            }
          };
        }
      });
    };

    intercept();

    new MutationObserver(intercept).observe(doc.body, {
      childList: true,
      subtree: true,
      attributes: true,
      attributeFilter: ['href','onclick','data-href','data-url','data-link']
    });

    // Broad click catch
    doc.addEventListener('click', e => {
      let el = e.target.closest('a,button,[onclick],[data-href],[data-url],[href]');
      if (!el) return;
      let url = el.href || el.getAttribute('href') ||
                el.dataset?.href || el.dataset?.url ||
                (el.getAttribute('onclick')?.match(/['"](https?:\/\/[^'"]+)['"]/i)?.[1]);
      if (url && tryCaptureUrl(url)) {
        e.preventDefault();
        e.stopImmediatePropagation();
      }
    }, true);

  } catch {}
}

function tryCaptureUrl(url) {
  if (!url) return false;
  try {
    const u = new URL(url, BASE);
    if (u.origin === BASE) {
      createOrReplaceIframe(u.href);
      return true;
    }
  } catch {}
  return false;
}

// Initial load listener
document.getElementById('frame').addEventListener('load', onFrameLoad);
</script>
</body>
</html>
