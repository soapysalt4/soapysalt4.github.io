<html>
    <head>
        <script src="/iframe.js"></script>
        <script src="/login-full-directory.js"></script>
        <title>Cloudmoon | VexaCloud</title>
        <link rel="icon" href="/images/favicon.png">
        <link rel="stylesheet" href="/iframe.css">
    </head>
<body>
<iframe id="cloudmoon" src="https://web.cloudmoonapp.com"></iframe>

<script>
const frame = document.getElementById("cloudmoon");

frame.onload = () => {
    const doc = frame.contentDocument || frame.contentWindow.document;

    // Intercept ALL link clicks inside Cloudmoon
    doc.addEventListener("click", (e) => {
        const link = e.target.closest("a");
        if (!link) return;

        const url = link.href;
        if (!url) return;

        // Stop Cloudmoon from opening a new tab
        e.preventDefault();
        e.stopPropagation();

        // Force the iframe to navigate instead
        frame.src = url;
    });
};
</script>
</body>
</html>
