<iframe id="cloudmoon" src="https://web.cloudmoonapp.com" style="width:100vw;height:100vh;border:none;"></iframe>

<script>
const frame = document.getElementById("cloudmoon");

frame.onload = () => {
    const doc = frame.contentDocument || frame.contentWindow.document;

    // Intercept ALL link clicks inside Cloudmoon
    doc.addEventListener("click", (e) => {
        const link = e.target.closest("a");
        if (!link) return;

        const url = link.href;
        if (!url) return;

        // Stop Cloudmoon from opening a new tab
        e.preventDefault();
        e.stopPropagation();

        // Force the iframe to navigate instead
        frame.src = url;
    });
};
</script>
