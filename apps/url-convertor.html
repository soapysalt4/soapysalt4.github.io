<!DOCTYPE html>
<html lang="en">
<head>
    <script>
  // ────────────────────────────────────────────────
  //  Cookie & ID helpers
  // ────────────────────────────────────────────────
  function setCookie(name, value, days) {
    const d = new Date();
    d.setTime(d.getTime() + days * 24 * 60 * 60 * 1000);
    document.cookie = name + "=" + value + "; expires=" + d.toUTCString() + "; path=/; SameSite=Lax";
  }

  function getCookie(name) {
    const match = document.cookie.match(new RegExp("(^| )" + name + "=([^;]+)"));
    return match ? match[2] : null;
  }

  function generateID() {
    return String(100000 + Math.floor(Math.random() * 900000));
  }

  // ────────────────────────────────────────────────
  //  Cronitor setup
  // ────────────────────────────────────────────────
  function loadCronitor() {
    const s = document.createElement('script');
    s.async = true;
    s.src = "https://rum.cronitor.io/script.js";
    document.head.appendChild(s);
    window.cronitor = window.cronitor || function() {
      (window.cronitor.q = window.cronitor.q || []).push(arguments);
    };
    cronitor('config', { clientKey: 'c983eb319c32e403949792590d38aae0' });
  }

  // ────────────────────────────────────────────────
  //  Main logic
  // ────────────────────────────────────────────────
  function setupUserIDAndBanCheck() {
    let userID = getCookie("userID");

    if (!userID) {
      userID = generateID();
      setCookie("userID", userID, 365);
    }

    const currentPath = window.location.pathname;
    const desiredPath = "/" + userID + "/";

    // UPDATED: check inside /banned/
    const banFile = "/banned/" + userID + ".html";

    fetch(banFile, { method: "HEAD", cache: "no-store" })
      .then(response => {
        if (response.ok) {
          window.location.replace(banFile);
          return;
        }

        if (currentPath !== desiredPath) {
          history.replaceState(null, "", desiredPath + window.location.search + window.location.hash);
        }

        loadCronitor();
        cronitor('ping', {
          monitor: 'user-id-' + userID,
          message: 'User ID: ' + userID,
          url: desiredPath
        });
      })
      .catch(() => {
        if (currentPath !== desiredPath) {
          history.replaceState(null, "", desiredPath + window.location.search + window.location.hash);
        }

        loadCronitor();
        cronitor('ping', {
          monitor: 'user-id-' + userID,
          message: 'User ID: ' + userID,
          url: desiredPath
        });
      });
  }

  if (document.readyState === 'complete') {
    setupUserIDAndBanCheck();
  } else {
    window.addEventListener('load', setupUserIDAndBanCheck);
  }
</script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data URL Converter • Hacker114</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="/login-full-directory.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Roboto Mono', monospace;
            background: #0d0d0d;
            color: #e63946;
            min-height: 100vh;
            padding: 20px;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(230,57,70,0.08) 0%, transparent 25%),

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #111111;
            border: 2px solid #e63946;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 
                0 0 30px rgba(230,57,70,0.25),
                inset 0 0 15px rgba(230,57,70,0.08);
            position: relative;
            overflow: hidden;
        }
        .container::before {
            content: '';

            display: flex;

            width: 100%;

<body>
    <div class="container">
        <h1>HACKER<span>114</span>'s CONVERTER</h1>

        <div class="controls">
            <select id="conversionType" onchange="toggleInputArea()">
                <option value="rawHtml">Raw HTML Code</option>
                <option value="githubLink">Raw GitHub Link</option>
                <option value="websiteSource">Website Link</option>
                <option value="uploadImage">Upload Image</option>
                <option value="uploadTextFile">Upload .txt File</option>
            </select>

            <select id="outputType">
                <option value="dataUrl">Data URL</option>
                <option value="blobUrl">Blob URL</option>
            </select>
        </div>

        <textarea id="inputArea" placeholder="Paste raw code / URL here..."></textarea>
        <input type="file" id="fileInput" class="hidden" accept="image/*,text/plain" onchange="handleFile()">
        <img id="imagePreview" src="" alt="Preview" class="hidden">

        <div class="actions">
            <button onclick="convertToUrl()">GENERATE</button>
            <button onclick="copyToClipboard()">COPY URL</button>
            <button onclick="clearFields()">CLEAR ALL</button>
        </div>

        <textarea id="resultOutput" placeholder="your data: or blob: url appears here..." readonly></textarea>
    </div>

    <script>
        let corsProxies = [
            'https://api.codetabs.com/v1/proxy?quest=',
            'https://api.codetabs.com/v1/tmp/?quest='
        ];
        let currentProxyIndex = 0;

        function toggleInputArea() {
            const type = document.getElementById('conversionType').value;
            const input = document.getElementById('inputArea');
            const file = document.getElementById('fileInput');
            const preview = document.getElementById('imagePreview');

            if (type === 'uploadImage' || type === 'uploadTextFile') {
                input.classList.add('hidden');
                file.classList.remove('hidden');
                preview.classList.toggle('hidden', type !== 'uploadImage');
            } else {
                input.classList.remove('hidden');
                file.classList.add('hidden');
                preview.classList.add('hidden');
            }
        }

        function handleFile() {
            const type = document.getElementById('conversionType').value;
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            if (!file) return;

            const reader = new FileReader();

            if (type === 'uploadImage') {
                reader.onload = e => {
                    const preview = document.getElementById('imagePreview');
                    preview.src = e.target.result;
                    preview.classList.remove('hidden');
                    document.getElementById('resultOutput').value = convertToBlobUrl(e.target.result);
                };
                reader.readAsDataURL(file);
            } else if (type === 'uploadTextFile') {
                reader.onload = e => {
                    const text = e.target.result;
                    const base64 = btoa(unescape(encodeURIComponent(text)));
                    const data = 'data:text/plain;base64,' + base64;
                    document.getElementById('resultOutput').value = convertToBlobUrl(data);
                };
                reader.readAsText(file);
            }
        }

        function convertToUrl() {
            const type = document.getElementById('conversionType').value;
            const out = document.getElementById('outputType').value;

            if (type === 'rawHtml') {
                convertRawHtmlToUrl(out);
            } else if (type === 'githubLink' || type === 'websiteSource') {
                fetchAndConvertUrl(out);
            }
        }

        function convertRawHtmlToUrl(outputType) {
            const html = document.getElementById('inputArea').value;
            const b64 = btoa(unescape(encodeURIComponent(html)));
            const data = 'data:text/html;base64,' + b64;
            document.getElementById('resultOutput').value = convertOutput(data, outputType);
        }

        function fetchAndConvertUrl(outputType) {
            const url = document.getElementById('inputArea').value.trim();
            if (!url) return alert('Enter a URL first');

            const proxy = corsProxies[currentProxyIndex];
            fetch(proxy + url)
                .then(r => r.text())
                .then(html => {
                    const b64 = btoa(unescape(encodeURIComponent(html)));
                    const data = 'data:text/html;base64,' + b64;
                    document.getElementById('resultOutput').value = convertOutput(data, outputType);
                })
                .catch(err => alert('Fetch error: ' + err));
            
            currentProxyIndex = (currentProxyIndex + 1) % corsProxies.length;
        }

        function convertOutput(dataUrl, outputType) {
            return outputType === 'blobUrl' ? convertToBlobUrl(dataUrl) : dataUrl;
        }

        function convertToBlobUrl(dataUrl) {
            const blob = dataUrlToBlob(dataUrl);
            return URL.createObjectURL(blob);
        }

        function dataUrlToBlob(dataUrl) {
            const [header, base64] = dataUrl.split(',');
            const mime = header.match(/:(.*?);/)[1];
            const binary = atob(base64);
            const array = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) {
                array[i] = binary.charCodeAt(i);
            }
            return new Blob([array], { type: mime });
        }

        function copyToClipboard() {
            const out = document.getElementById('resultOutput');
            out.select();
            document.execCommand('copy');
            alert('URL copied to clipboard!');
        }

        function clearFields() {
            document.getElementById('inputArea').value = '';
            document.getElementById('resultOutput').value = '';
            document.getElementById('fileInput').value = '';
            document.getElementById('imagePreview').src = '';
            document.getElementById('imagePreview').classList.add('hidden');
        }

        // init
        toggleInputArea();
    </script>
</body>
</html>
