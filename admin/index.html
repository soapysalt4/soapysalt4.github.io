<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="https://vexacloud.github.io/images/favicon.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Redirecting...</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 100%);
      color: #e0e7ff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 40px 30px;
      background: rgba(20, 35, 60, 0.65);
      border-radius: 16px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(100, 150, 255, 0.18);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      max-width: 480px;
      width: 90%;
    }

    h1 {
      font-size: 2.1rem;
      margin: 0 0 1.2rem 0;
      color: #a5b4fc;
      text-shadow: 0 2px 10px rgba(100, 140, 255, 0.4);
    }

    .status {
      font-size: 1.15rem;
      margin: 0 0 2.2rem 0;
      opacity: 0.92;
    }

    .countdown {
      font-size: 3.8rem;
      font-weight: 700;
      color: #67e8f9;
      margin: 0.4rem 0 1.8rem 0;
      text-shadow: 0 0 20px rgba(103, 232, 249, 0.7);
    }

    .btn {
      display: inline-block;
      padding: 16px 48px;
      font-size: 1.3rem;
      font-weight: 600;
      color: white;
      background: linear-gradient(90deg, #22d3ee, #06b6d4);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.22s ease;
      box-shadow: 0 6px 25px rgba(34, 211, 238, 0.45);
      text-decoration: none;
      margin-top: 12px;
    }

    .btn:hover {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 12px 40px rgba(34, 211, 238, 0.6);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .fallback {
      display: none;
      margin-top: 2.5rem;
      padding: 20px;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.4);
      border-radius: 12px;
      font-size: 1.1rem;
      line-height: 1.5;
    }

    .glow {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle at center, rgba(34, 211, 238, 0.12) 0%, transparent 60%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: -1;
      opacity: 0.7;
    }

    @media (max-width: 500px) {
      .countdown { font-size: 3.2rem; }
      h1 { font-size: 1.9rem; }
      .btn { padding: 14px 40px; font-size: 1.2rem; }
    }
  </style>
</head>
<body>

<div class="glow"></div>

<div class="container">
  <h1>Redirecting to Admin Login</h1>
  <div class="status">You will be redirected automatically in</div>
  <div class="countdown" id="count">10</div>

  <a href="https://admin.orrysander.workers.dev" class="btn" id="goBtn">
    Go Now (<span id="countSmall">10</span>)
  </a>

  <div class="fallback" id="fallback">
    The browser or frame restrictions blocked the automatic redirect.<br><br>
    <strong>Please allow popups for VexaCloud.github.io</strong><br>
  </div>
</div>

<script>
const TARGET = "https://admin.orrysander.workers.dev";
let seconds = 10;
let redirectAttempted = false;

const countEl     = document.getElementById("count");
const countSmall  = document.getElementById("countSmall");
const fallback    = document.getElementById("fallback");
const goBtn       = document.getElementById("goBtn");

function updateDisplay() {
  countEl.textContent = seconds;
  countSmall.textContent = seconds;
}

function showFallback() {
  fallback.style.display = "block";
  goBtn.style.display = "none";
  countEl.style.display = "none";
}

function tryBreakoutAndRedirect() {
  if (redirectAttempted) return;
  redirectAttempted = true;

  window.location.replace(TARGET);

  if (window.top && window.top !== window.self) {
    try {
      window.top.location.replace(TARGET);
    } catch(e) {
      setTimeout(showFallback, 600);
    }
  }

  setTimeout(() => {
    if (!redirectAttempted) return;
    const w = window.open(TARGET, "_blank");
    if (!w || w.closed || typeof w.closed === "undefined") {
      showFallback();
    }
  }, 400);
}

const timer = setInterval(() => {
  seconds--;
  updateDisplay();

  if (seconds <= 0) {
    clearInterval(timer);
    tryBreakoutAndRedirect();
  }
}, 1000);

goBtn.addEventListener("click", (e) => {
  e.preventDefault();
  clearInterval(timer);
  tryBreakoutAndRedirect();
});

if (window.top === window.self) {
  setTimeout(tryBreakoutAndRedirect, 1200);
}

updateDisplay();
</script>
</body>
</html>
