<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verification Required</title>
  <link rel="icon" href="https://vexacloud.github.io/images/favicon.png">
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background-color: #0d1b2a;
      color: #ffffff;
      font-family: -apple-system, BlinkMacOSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }
    .container {
      max-width: 600px;
    }
    h1 {
      margin-bottom: 1.5rem;
      font-size: 1.8rem;
    }
    p {
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }
    #okButton {
      background-color: #4CAF50;
      color: white;
      border: none;
      padding: 14px 32px;
      font-size: 1.1rem;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      min-width: 180px;
    }
    #okButton:hover:not(:disabled) {
      background-color: #45a049;
      transform: translateY(-1px);
    }
    #okButton:disabled {
      background-color: #2e7d32;
      opacity: 0.6;
      cursor: not-allowed;
    }
    .countdown {
      font-size: 1.3rem;
      margin-bottom: 1.5rem;
      min-height: 1.8rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Warning!</h1>
   
    <div class="countdown" id="countdown">Please wait 15 seconds...</div>
   
    <p id="warningText">
      This software has ads that may be dangerous. Please do not click allow notifications, confirm you are not a robot, or download any file when on this proxy. To get rid of the ads, X them out until one is not in the way of the screen.
    </p>
    <button id="okButton" disabled>OK</button>
  </div>

  <script>
    const button = document.getElementById('okButton');
    const countdownElement = document.getElementById('countdown');
   
    let secondsLeft = 15;
    const timer = setInterval(() => {
      secondsLeft--;
     
      if (secondsLeft <= 0) {
        clearInterval(timer);
        button.disabled = false;
        countdownElement.textContent = "You may now continue";
      } else {
        countdownElement.textContent = `Please wait ${secondsLeft} second${secondsLeft !== 1 ? 's' : ''}...`;
      }
    }, 1000);

    button.addEventListener('click', () => {
      document.cookie = 
        "rel_allowed_key_apikey_177giiao3z4qloz41icb21z0oke=true;" +
        " path=/;" +
        " max-age=86400;" +     
        " SameSite=Lax";

      console.log("Cookie attempted — check devtools → Application → Cookies");

      window.location.href = "https://vexacloud.github.io/login/authuser-1.html";
    });
  </script>
</body>
</html>
