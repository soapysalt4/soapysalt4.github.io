<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VexaCloud Apps</title>
  <link rel="icon" href="https://vexacloud.github.io/images/favicon.png">

  <style>
    body {
      margin: 0;
      background: #0d1b2a;
      color: #e0e7ff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 2.4rem;
      margin-bottom: 30px;
      color: #a5b4fc;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 900px;
    }

    .app {
      background: #1b263b;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.08);
      transition: 0.2s ease;
      text-decoration: none;
      color: #e0e7ff;
    }

    .app:hover {
      transform: translateY(-4px);
      background: #24344d;
      border-color: rgba(255,255,255,0.18);
    }

    .app-title {
      font-size: 1.2rem;
      font-weight: 600;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <h1>VexaCloud Apps</h1>

  <div class="grid">
    <a class="app" href="/apps/app1.html">
      <div class="app-title">App 1</div>
    </a>

    <a class="app" href="/apps/app2.html">
      <div class="app-title">App 2</div>
    </a>

    <a class="app" href="/apps/app3.html">
      <div class="app-title">App 3</div>
    </a>

    <a class="app" href="/apps/">
      <div class="app-title">All Apps</div>
    </a>
  </div>
</body>
</html>
