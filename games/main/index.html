<head>
  <script>
    function setCookie(name, value, days) {
      const d = new Date();
      d.setTime(d.getTime() + days * 24 * 60 * 60 * 1000);
      document.cookie = name + "=" + value + "; expires=" + d.toUTCString() + "; path=/; SameSite=Lax";
    }
    function getCookie(name) {
      const match = document.cookie.match(new RegExp("(^| )" + name + "=([^;]+)"));
      return match ? match[2] : null;
    }
    function generateID() {
      return String(100000 + Math.floor(Math.random() * 900000));
    }
    // ────────────────────────────────────────────────
    // Cronitor setup
    // ────────────────────────────────────────────────
    function loadCronitor() {
      const s = document.createElement('script');
      s.async = true;
      s.src = "https://rum.cronitor.io/script.js";
      document.head.appendChild(s);
      window.cronitor = window.cronitor || function() {
        (window.cronitor.q = window.cronitor.q || []).push(arguments);
      };
      cronitor('config', { clientKey: 'c983eb319c32e403949792590d38aae0' });
    }
    // ────────────────────────────────────────────────
    // Main logic
    // ────────────────────────────────────────────────
    function setupUserIDAndBanCheck() {
      let userID = getCookie("userID");
      if (!userID) {
        userID = generateID();
        setCookie("userID", userID, 365);
      }
      const currentPath = window.location.pathname;
      const desiredPath = "/" + userID + "/";
      // UPDATED: check inside /banned/
      const banFile = "/banned/" + userID + ".html";
      fetch(banFile, { method: "HEAD", cache: "no-store" })
        .then(response => {
          if (response.ok) {
            window.location.replace(banFile);
            return;
          }
          if (currentPath !== desiredPath) {
            history.replaceState(null, "", desiredPath + window.location.search + window.location.hash);
          }
          loadCronitor();
          cronitor('ping', {
            monitor: 'user-id-' + userID,
            message: 'User ID: ' + userID,
            url: desiredPath
          });
        })
        .catch(() => {
          if (currentPath !== desiredPath) {
            history.replaceState(null, "", desiredPath + window.location.search + window.location.hash);
          }
          loadCronitor();
          cronitor('ping', {
            monitor: 'user-id-' + userID,
            message: 'User ID: ' + userID,
            url: desiredPath
          });
        });
    }
    if (document.readyState === 'complete') {
      setupUserIDAndBanCheck();
    } else {
      window.addEventListener('load', setupUserIDAndBanCheck);
    }
  </script>

      <script>
        const SHOW_POPUP = true;
        const POPUP_HEADER = "Under Construction";
        const POPUP_BODY  = "Please use the game sites in Apps! This section of the website is still under construction. Use at your own risk! ";

        function createAnnouncementPopup() {
            if (!SHOW_POPUP) return;
            if (document.getElementById("announcement-overlay")) return;

            const overlay = document.createElement("div");
            overlay.id = "announcement-overlay";

            const popup = document.createElement("div");
            popup.id = "announcement-popup";
            popup.innerHTML = `
                <span class="announcement-close">&times;</span>
                <h2>${POPUP_HEADER}</h2>
                <p>${POPUP_BODY}</p>
            `;

            overlay.appendChild(popup);
            document.body.appendChild(overlay);

            const closeBtn = popup.querySelector(".announcement-close");
            closeBtn.addEventListener("click", () => overlay.remove());

            overlay.addEventListener("click", (e) => {
                if (e.target === overlay) overlay.remove();
            });
        }

        window.addEventListener("load", createAnnouncementPopup);
    </script>

const dataArr = gamelist.sort((a, b) => a.title.localeCompare(b.title));

function applyTheme(mode) {
  const root = document.documentElement;
  if (mode === "light") {
    root.style.setProperty("--back", "rgb(230, 230, 230)");
    root.style.setProperty("--font", "#111");
    root.style.setProperty("--tile", "rgba(210, 210, 210, 0.92)");
    document.getElementById("res").innerHTML = '<span class="material-symbols-outlined">dark_mode</span>';
    document.body.style.backgroundImage = "url('/images/22973.gif')";
  } else {
    root.style.setProperty("--back", "rgba(11, 11, 11, 1)");
    root.style.setProperty("--font", "white");
    root.style.setProperty("--tile", "rgba(15, 15, 15, 0.88)");
    document.getElementById("res").innerHTML = '<span class="material-symbols-outlined">light_mode</span>';
    document.body.style.backgroundImage = "url('/images/22972.jpg')";
  }
  document.body.style.backgroundSize = "cover";
  document.body.style.backgroundPosition = "center";
  document.body.style.backgroundRepeat = "no-repeat";
  document.body.style.backgroundAttachment = "fixed";
}

function change() {
  const current = localStorage.getItem("theme") === "dark" ? "light" : "dark";
  localStorage.setItem("theme", current);
  applyTheme(current);
}

applyTheme(localStorage.getItem("theme") || "dark");

$("#search").on("input", function() {
  const val = $(this).val().toLowerCase().trim();
  $("#tilecontainer").empty();
  dataArr.filter(g => g.title.toLowerCase().includes(val))
    .forEach(game => {
      const tile = $(`<div class="tile"><img src="${game.imgSrc}" alt=""><p class="sigma">${game.title}</p></div>`);
      tile.on("click", () => cloak(game.link));
      $("#tilecontainer").append(tile);
    });
});

function cloak(url) {
  const win = window.open("about:blank", "_blank", "width=1280,height=800,menubar=no,toolbar=no");
  if (win) {
    win.document.write(`
      <!DOCTYPE html><html><head><title>VexaCloud</title></head>
      <body style="margin:0;padding:0;background:#000;overflow:hidden;">
        <iframe src="${url}" style="border:0;width:100%;height:100vh;"></iframe>
      </body></html>
    `);
    win.document.close();
  } else {
    alert("Popup blocked – please allow popups for this site.");
  }
}

function openRandom() {
  const idx = Math.floor(Math.random() * dataArr.length);
  cloak(dataArr[idx].link);
}

$(document).ready(() => {
  dataArr.forEach(game => {
    const tile = $(`<div class="tile"><img src="${game.imgSrc}" alt=""><p class="sigma">${game.title}</p></div>`);
    tile.on("click", () => cloak(game.link));
    $("#tilecontainer").append(tile);
  });
});
