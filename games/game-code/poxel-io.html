<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      height: 100vh;
      background: linear-gradient(135deg, #0a1428 0%, #1e3a8a 50%, #0f172a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Subtle animated background particles */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 30%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(147, 197, 253, 0.12) 0%, transparent 50%),
        radial-gradient(circle at 40% 80%, rgba(96, 165, 250, 0.1) 0%, transparent 60%);
      animation: pulse 15s ease-in-out infinite;
      z-index: 1;
    }

    .container {
      text-align: center;
      z-index: 2;
      padding: 40px;
    }

    h1 {
      color: #dbeafe;
      font-size: 3.5rem;
      margin-bottom: 1.5rem;
      font-weight: 600;
      text-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
    }

    p {
      color: #94a3b8;
      font-size: 1.2rem;
      margin-bottom: 3rem;
      max-width: 400px;
    }

    .buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 16px 40px;
      font-size: 1.1rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none;
      display: inline-block;
      min-width: 180px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: 0.7s;
    }

    .btn:hover::before {
      left: 200%;
    }

    .btn1 {
      background: linear-gradient(135deg, #1e40af, #3b82f6);
      color: white;
      box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
    }

    .btn1:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(59, 130, 246, 0.6);
      background: linear-gradient(135deg, #3b82f6, #60a5fa);
    }

    .btn2 {
      background: linear-gradient(135deg, #1e3a8a, #2563eb);
      color: white;
      box-shadow: 0 10px 30px rgba(37, 99, 235, 0.35);
    }

    .btn2:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(37, 99, 235, 0.55);
      background: linear-gradient(135deg, #2563eb, #60a5fa);
    }

    /* Glowing effect */
    .btn:after {
      content: '';
      position: absolute;
      inset: -2px;
      background: linear-gradient(45deg, #60a5fa, #93c5fd, #60a5fa);
      border-radius: 14px;
      z-index: -1;
      opacity: 0;
      transition: opacity 0.3s;
      filter: blur(8px);
    }

    .btn:hover:after {
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Poxel.io</h1>
    <p>Choose version</p>
    
    <div class="buttons">
      <a href="/games/game-code/poxel-io-crazy-games.html" class="btn btn1">Crazy Games</a>
      <a href="/games/game-code/poxel-io-official.html" class="btn btn2">Official</a>
    </div>
  </div>

  <script>
    document.querySelectorAll('.btn').forEach(button => {
      button.addEventListener('click', function(e) {
        this.style.transform = 'scale(0.95)';
        setTimeout(() => {
          this.style.transform = 'scale(1)';
        }, 150);
      });
    });
  </script>
</body>
</html>
