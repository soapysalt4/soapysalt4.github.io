<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirka.io</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: #000;
            margin: 0;
        }

        .iframe-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .join-party-btn {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            padding: 8px 20px;
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.85);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all 0.4s ease;
            user-select: none;
            opacity: 0.75;
        }

        .join-party-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            opacity: 0.9;
        }

        .countdown {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            min-width: 18px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="iframe-container">
        <iframe src="https://kirka.io" allowfullscreen loading="eager"></iframe>
    </div>
    <button id="joinBtn" class="join-party-btn">
        Join Party
        <span id="countdown" class="countdown">3</span>
    </button>

    <script>
        const joinBtn = document.getElementById('joinBtn');
        const countdownEl = document.getElementById('countdown');
        
        let timeLeft = 3;
        let countdownInterval;

        function startCountdown() {
            countdownInterval = setInterval(() => {
                timeLeft--;
                countdownEl.textContent = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    joinBtn.style.transition = 'opacity 0.8s ease';
                    joinBtn.style.opacity = '0';
                    
                    setTimeout(() => {
                        joinBtn.style.display = 'none';
                    }, 900);
                }
            }, 1000);
        }

        joinBtn.addEventListener('click', () => {
            window.location.href = '/games/k1488r00/kirka-party.html';
        });
        startCountdown();
    </script>
</body>
</html>
