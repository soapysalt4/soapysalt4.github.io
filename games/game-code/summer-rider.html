<html><head><base target="_blank"></head><body><div id="container">
  <iframe id="fr" width="100%" height="100%" frameborder="0" allowfullscreen=""></iframe>
  <button class="play-button" type="button" onclick="PlayTo(this)">CLICK TO PLAY</button>
</div>

<style>
  .play-button {
    padding: 22px 48px;
    background: linear-gradient(135deg, #0a1a3a, #0d2b6b);
    color: #ffffff;
    border: 3px solid #1e3a8a;
    border-radius: 12px;
    font: bold 26px Arial;
    cursor: pointer;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 1001;

    /* Animation */
    box-shadow: 0 0 20px rgba(30, 58, 138, 0.6);
    transition: 0.25s ease;
    animation: pulseGlow 2.2s infinite ease-in-out;
  }

  .play-button:hover {
    background: linear-gradient(135deg, #12306b, #1e3a8a);
    box-shadow: 0 0 30px rgba(30, 58, 138, 0.9);
    transform: translate(-50%, -50%) scale(1.06);
  }

  @keyframes pulseGlow {
    0% {
      box-shadow: 0 0 18px rgba(30, 58, 138, 0.5);
    }
    50% {
      box-shadow: 0 0 32px rgba(30, 58, 138, 0.9);
    }
    100% {
      box-shadow: 0 0 18px rgba(30, 58, 138, 0.5);
    }
  }

  .fullscreen-button {
    padding: 10px 15px;
    background: #0a1a3a;
    color: #fff;
    border: 2px solid #1e3a8a;
    border-radius: 5px;
    font: bold 14px Arial;
    cursor: pointer;
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 1002;
    transition: 0.25s ease;
  }

  .fullscreen-button:hover {
    background: #1e3a8a;
    box-shadow: 0 0 15px rgba(30, 58, 138, 0.8);
  }

  body, html {
    margin: 0;
    padding: 0;
    overflow: hidden;
    height: 100%;
  }
</style>

<script>
  const DB_NAME = 'GameCacheDB';
  const STORE_NAME = 'GameFiles';
  const CACHE_DURATION = 90 * 24 * 60 * 60 * 1000; // 3 ay
  const FILE_URL = 'https://cdn.jsdelivr.net/gh/papamamia/447755@main/1.xml';

  function openDB() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open(DB_NAME, 1);
      request.onupgradeneeded = (event) => {
        const db = event.target.result;
        db.createObjectStore(STORE_NAME, { keyPath: 'url' });
      };
      request.onsuccess = (event) => resolve(event.target.result);
      request.onerror = (event) => reject(event.target.error);
    });
  }

  async function saveToCache(url, content) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const transaction = db.transaction(STORE_NAME, 'readwrite');
      const store = transaction.objectStore(STORE_NAME);
      const request = store.put({ url: url, content: content, timestamp: Date.now() });
      request.onsuccess = () => resolve();
      request.onerror = () => reject(new Error('Cache error'));
    });
  }

  async function getFileFromCache(url) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const transaction = db.transaction(STORE_NAME, 'readonly');
      const store = transaction.objectStore(STORE_NAME);
      const request = store.get(url);
      request.onsuccess = async (event) => {
        const data = event.target.result;
        if (data && (Date.now() - data.timestamp) < CACHE_DURATION) {
          resolve(data.content);
        } else {
          try {
            const response = await fetch(url);
            const text = await response.text();
            await saveToCache(url, text);
            resolve(text);
          } catch (err) {
            reject(err);
          }
        }
      };
      request.onerror = () => reject(new Error('DB error'));
    });
  }

  function PlayTo(button) {
    const iframe = document.getElementById("fr");
    getFileFromCache(FILE_URL).then((text) => {
      iframe.contentDocument.open();
      iframe.contentDocument.write(text);
      iframe.contentDocument.close();
      iframe.style.display = "block";
      button.style.display = "none";
    }).catch((err) => {
      console.error('Error:', err);
      alert('Oyun yüklenemedi.');
    });
  }

  function openFullscreen() {
    getFileFromCache(FILE_URL).then((text) => {
      const newWindow = window.open("", "_blank");
      if (newWindow) {
        newWindow.document.open();
        newWindow.document.write(text);
        newWindow.document.close();
      } else {
        alert('Tam ekran açılamadı.');
      }
    }).catch((err) => {
      console.error('Error:', err);
      alert('Tam ekran yüklenemedi.');
    });
  }
</script></body></html>
