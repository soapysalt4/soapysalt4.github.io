<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/iframe.js"></script>
  <script>
  // ────────────────────────────────────────────────
  //  Cookie & ID helpers
  // ────────────────────────────────────────────────
  function setCookie(name, value, days) {
    const d = new Date();
    d.setTime(d.getTime() + days * 24 * 60 * 60 * 1000);
    document.cookie = name + "=" + value + "; expires=" + d.toUTCString() + "; path=/; SameSite=Lax";
  }

  function getCookie(name) {
    const match = document.cookie.match(new RegExp("(^| )" + name + "=([^;]+)"));
    return match ? match[2] : null;
  }

  function generateID() {
    return String(100000 + Math.floor(Math.random() * 900000));
  }

  // ────────────────────────────────────────────────
  //  Cronitor setup
  // ────────────────────────────────────────────────
  function loadCronitor() {
    const s = document.createElement('script');
    s.async = true;
    s.src = "https://rum.cronitor.io/script.js";
    document.head.appendChild(s);
    window.cronitor = window.cronitor || function() {
      (window.cronitor.q = window.cronitor.q || []).push(arguments);
    };
    cronitor('config', { clientKey: 'c983eb319c32e403949792590d38aae0' });
  }

  // ────────────────────────────────────────────────
  //  Main logic
  // ────────────────────────────────────────────────
  function setupUserIDAndBanCheck() {
    let userID = getCookie("userID");

    if (!userID) {
      userID = generateID();
      setCookie("userID", userID, 365);
    }

    const currentPath = window.location.pathname;
    const desiredPath = "/" + userID + "/";

    // UPDATED: check inside /banned/
    const banFile = "/banned/" + userID + ".html";

    fetch(banFile, { method: "HEAD", cache: "no-store" })
      .then(response => {
        if (response.ok) {
          window.location.replace(banFile);
          return;
        }

        if (currentPath !== desiredPath) {
          history.replaceState(null, "", desiredPath + window.location.search + window.location.hash);
        }

        loadCronitor();
        cronitor('ping', {
          monitor: 'user-id-' + userID,
          message: 'User ID: ' + userID,
          url: desiredPath
        });
      })
      .catch(() => {
        if (currentPath !== desiredPath) {
          history.replaceState(null, "", desiredPath + window.location.search + window.location.hash);
        }

        loadCronitor();
        cronitor('ping', {
          monitor: 'user-id-' + userID,
          message: 'User ID: ' + userID,
          url: desiredPath
        });
      });
  }

  if (document.readyState === 'complete') {
    setupUserIDAndBanCheck();
  } else {
    window.addEventListener('load', setupUserIDAndBanCheck);
  }
</script>
  <script src="/login-full-directory.js"></script>
  <link rel="icon" type="image/png" href="/images/favicon.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 - Lost in Space</title>
  <style>
    :root {
      --bg: #0a0e17;
      --accent: #3b82f6;
      --accent-dark: #1e40af;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      overflow-x: hidden;
      background-image:
        radial-gradient(circle at 15% 50%, #1e293b 0%, transparent 25%),
        radial-gradient(circle at 85% 30%, #1e293b 0%, transparent 35%);
    }

    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      position: relative;
    }

    .big-404 {
      font-size: clamp(10rem, 25vw, 18rem);
      font-weight: 900;
      line-height: 0.85;
      letter-spacing: -0.5rem;
      background: linear-gradient(135deg, #60a5fa, #3b82f6, #1e40af);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 40px rgba(59,130,246,0.4);
      user-select: none;
      margin-bottom: 1.5rem;
    }

    .title {
      font-size: clamp(2.2rem, 6vw, 4.5rem);
      font-weight: 700;
      margin-bottom: 1.2rem;
      color: white;
    }

    .subtitle {
      font-size: clamp(1.1rem, 3.5vw, 1.4rem);
      color: var(--text-dim);
      max-width: 480px;
      line-height: 1.5;
      margin-bottom: 2.5rem;
    }

    .home-btn {
      display: inline-block;
      padding: 1rem 2.2rem;
      font-size: 1.2rem;
      font-weight: 600;
      color: white;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      text-decoration: none;
      transition: all 0.25s ease;
      box-shadow: 0 10px 25px rgba(59,130,246,0.35);
      position: relative;
      overflow: hidden;
    }

    .home-btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 18px 35px rgba(59,130,246,0.45);
      background: #60a5fa;
    }

    .home-btn:active {
      transform: translateY(-1px);
    }

    /* Floating astronaut */
    .astronaut {
      position: absolute;
      width: 180px;
      height: 180px;
      opacity: 0.25;
      pointer-events: none;
      animation: float 18s infinite ease-in-out;
      filter: drop-shadow(0 0 30px rgba(59,130,246,0.6));
    }

    .astronaut.left  { bottom: 12%; left: 8%;  animation-delay: 0s;    }
    .astronaut.right { top:  15%; right: 6%; animation-delay: -9s; }

    @keyframes float {
      0%, 100%   { transform: translateY(0) rotate(0deg); }
      50%        { transform: translateY(-45px) rotate(8deg); }
    }

    /* Stars */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: transparent;
      z-index: -1;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle 6s infinite alternate;
    }

    @keyframes twinkle {
      0%,100% { opacity: 0.4; }
      50%     { opacity: 1; }
    }

    @media (max-width: 640px) {
      .astronaut { width: 120px; height: 120px; }
      .big-404 { letter-spacing: -0.3rem; }
    }
  </style>
</head>
<body>

  <div class="stars"></div>

  <div class="container">
    <div class="astronaut left">
      <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="100" cy="100" r="78" stroke="#60a5fa" stroke-width="6" opacity="0.7"/>
        <circle cx="100" cy="100" r="52" fill="#1e293b" stroke="#3b82f6" stroke-width="8"/>
        <rect x="70" y="85" width="60" height="30" rx="6" fill="#0f172a"/>
        <circle cx="100" cy="70" r="18" fill="#60a5fa" opacity="0.9"/>
      </svg>
    </div>

    <div class="big-404">404</div>
    <h1 class="title">THIS PAGE DOES NOT EXIST</h1>
    <p class="subtitle">
      The page you're looking for has been moved, deleted, or never existed<br>
     
    </p>

    <a href="/" class="home-btn">Return Home</a>

    <div class="astronaut right">
      <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="100" cy="100" r="78" stroke="#60a5fa" stroke-width="6" opacity="0.7"/>
        <circle cx="100" cy="100" r="52" fill="#1e293b" stroke="#3b82f6" stroke-width="8"/>
        <rect x="70" y="85" width="60" height="30" rx="6" fill="#0f172a"/>
        <circle cx="100" cy="70" r="18" fill="#60a5fa" opacity="0.9"/>
      </svg>
    </div>
  </div>

  <script>
    // Optional: few twinkling stars
    const starsContainer = document.querySelector('.stars');
    for(let i = 0; i < 80; i++){
      const star = document.createElement('div');
      star.className = 'star';
      star.style.width = star.style.height = Math.random() * 2.5 + 'px';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 5 + 's';
      starsContainer.appendChild(star);
    }
  </script>

</body>
</html>
