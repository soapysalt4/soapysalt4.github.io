  <script>
  // ────────────────────────────────────────────────
  //  Cookie & ID helpers
  // ────────────────────────────────────────────────
  function setCookie(name, value, days) {
    const d = new Date();
    d.setTime(d.getTime() + days * 24 * 60 * 60 * 1000);
    document.cookie = name + "=" + value + "; expires=" + d.toUTCString() + "; path=/; SameSite=Lax";
  }

  function getCookie(name) {
    const match = document.cookie.match(new RegExp("(^| )" + name + "=([^;]+)"));
    return match ? match[2] : null;
  }

  function generateID() {
    return String(100000 + Math.floor(Math.random() * 900000));
  }

  // ────────────────────────────────────────────────
  //  Cronitor setup (from your original code)
  // ────────────────────────────────────────────────
  function loadCronitor() {
    const s = document.createElement('script');
    s.async = true;
    s.src = "https://rum.cronitor.io/script.js";
    document.head.appendChild(s);
    window.cronitor = window.cronitor || function() {
      (window.cronitor.q = window.cronitor.q || []).push(arguments);
    };
    cronitor('config', { clientKey: 'c983eb319c32e403949792590d38aae0' });
  }

  // ────────────────────────────────────────────────
  //  Main logic – delayed to avoid resource race
  // ────────────────────────────────────────────────
  function setupUserIDAndBanCheck() {
    let userID = getCookie("userID");

    if (!userID) {
      userID = generateID();
      setCookie("userID", userID, 365);
    }

    const currentPath = window.location.pathname;
    const desiredPath = "/" + userID + "/";  // trailing slash preferred for CF Pages

    const banFile = "/" + userID + ".html";

    // Check ban first (fast HEAD)
    fetch(banFile, { method: "HEAD", cache: "no-store" })
      .then(response => {
        if (response.ok) {
          window.location.replace(banFile);  // go to ban page if exists
          return;
        }

        // Not banned → update URL silently + ping cronitor
        if (currentPath !== desiredPath) {
          history.replaceState(null, "", desiredPath + window.location.search + window.location.hash);
        }

        loadCronitor();
        cronitor('ping', {
          monitor: 'user-id-' + userID,
          message: 'User ID: ' + userID,
          url: desiredPath
        });
      })
      .catch(() => {
        // Ban file not found/error → proceed with URL update + ping
        if (currentPath !== desiredPath) {
          history.replaceState(null, "", desiredPath + window.location.search + window.location.hash);
        }

        loadCronitor();
        cronitor('ping', {
          monitor: 'user-id-' + userID,
          message: 'User ID: ' + userID,
          url: desiredPath
        });
      });
  }

  // Run after load to give resources time to start fetching
  if (document.readyState === 'complete') {
    setupUserIDAndBanCheck();
  } else {
    window.addEventListener('load', setupUserIDAndBanCheck);
  }
</script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;

    html, body {
      height: 100%;

    .card {
      max-width: 520px;
      padding: 2.5rem 2.75rem;
      border-radius: 24px;
      background: rgba(20, 0, 0, 0.78);
      border: 1px solid rgba(255, 80, 80, 0.35);
      box-shadow:
        0 0 40px rgba(0, 0, 0, 0.8),
        0 0 80px rgba(255, 60, 60, 0.35);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -40%;
      background:
        radial-gradient(circle at 0 0, rgba(255, 0, 0, 0.18), transparent 55%),
        radial-gradient(circle at 100% 100%, rgba(255, 60, 60, 0.18), transparent 55%);

    .glitch {
      font-size: clamp(4rem, 10vw, 6rem);

      text-transform: uppercase;
      position: relative;
      display: inline-block;

      text-shadow:
        0 0 12px rgba(255, 255, 255, 0.6),
        0 0 40px rgba(255, 80, 80, 0.8);
      margin-bottom: 0.5rem;
    }

    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      mix-blend-mode: screen;
      clip-path: inset(0 0 0 0);
      animation: glitch 2.2s infinite linear alternate-reverse;

    .glitch::before {

      30% { clip-path: inset(80% 0 0 0); }

<body>
  <canvas id="particles"></canvas>

  <div class="overlay">
    <div class="card">
      <div class="card-inner">
        <div class="glitch" data-text="404">404</div>
        <div class="subtitle">Page not found</div>
        <p class="message">
          The page you requested doesn't exist!
        </p>
        <div class="actions">
          <a href="/" class="btn">Return</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Particle background (red variant)
    const canvas = document.getElementById("particles");
    const ctx = canvas.getContext("2d");

    let width = window.innerWidth;
    let height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;

    const particleCount = 140;
    const particles = [];
    const mouse = { x: null, y: null, radius: 120 };

    class Particle {
      constructor() {
        this.reset(true);
      }

      reset(initial = false) {
        this.x = initial ? Math.random() * width : (Math.random() < 0.5 ? 0 : width);
        this.y = Math.random() * height;
        this.size = Math.random() * 2.2 + 0.4;
        this.baseSpeed = Math.random() * 0.6 + 0.2;
        this.vx = (Math.random() - 0.5) * this.baseSpeed;
        this.vy = (Math.random() - 0.5) * this.baseSpeed;
        this.alpha = Math.random() * 0.7 + 0.3;
        this.pulse = Math.random() * Math.PI * 2;
        this.hue = 0 + Math.random() * 20; // red tones
      }

      draw() {
        const pulseSize = this.size + Math.sin(this.pulse) * 0.3;
        ctx.beginPath();
        const gradient = ctx.createRadialGradient(
          this.x, this.y, 0,
          this.x, this.y, pulseSize * 3
        );
        gradient.addColorStop(0, `hsla(${this.hue}, 90%, 60%, ${this.alpha})`);
        gradient.addColorStop(1, "transparent");
        ctx.fillStyle = gradient;
        ctx.arc(this.x, this.y, pulseSize * 3, 0, Math.PI * 2);
        ctx.fill();
      }

      update() {
        this.pulse += 0.03;
        this.x += this.vx;
        this.y += this.vy;

        if (this.x < -50 || this.x > width + 50 || this.y < -50 || this.y > height + 50) {
          this.reset();
        }

        if (mouse.x !== null && mouse.y !== null) {
          const dx = this.x - mouse.x;
          const dy = this.y - mouse.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < mouse.radius) {
            const force = (mouse.radius - dist) / mouse.radius;
            const angle = Math.atan2(dy, dx);
            this.x += Math.cos(angle) * force * 2.2;
            this.y += Math.sin(angle) * force * 2.2;
          }
        }
      }
    }

    function initParticles() {
      particles.length = 0;
      for (let i = 0; i < particleCount; i++) {
        particles.push(new Particle());
      }
    }

    function animate() {
      ctx.clearRect(0, 0, width, height);
      ctx.globalCompositeOperation = "lighter";
      particles.forEach(p => {
        p.update();
        p.draw();
      });
      ctx.globalCompositeOperation = "source-over";
      requestAnimationFrame(animate);
    }

    initParticles();
    animate();

    window.addEventListener("resize", () => {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
      initParticles();
    });

    window.addEventListener("mousemove", e => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    window.addEventListener("mouseleave", () => {
      mouse.x = null;
      mouse.y = null;
    });
  </script>
</body>
